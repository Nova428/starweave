<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starweaver - Weave Your Future Into Reality</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Smooth Scrolling & Base Resets */
        html {
            scroll-behavior: smooth;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: white;
            background: linear-gradient(135deg, #050816, #0c1230, #170f3f);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Seamless Ambient Starfield Animation */
        #stars {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(white 1px, transparent 1px),
                radial-gradient(#f8d66d 1px, transparent 1px);
            background-size: 50px 50px, 100px 100px;
            animation: drift 40s linear infinite;
            opacity: .5;
        }
        @keyframes drift {
            from { background-position: 0 0, 0 0; }
            to { background-position: 0 -100px, 0 -100px; }
        }

        /* Sticky Blurred Navigation Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 8%;
            background: rgba(5, 8, 22, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(248, 214, 109, 0.05);
        }
        .logo {
            font-family: Cinzel, serif;
            color: #f8d66d;
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
        }
        nav a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin-left: 24px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        nav a:hover {
            color: #f8d66d;
        }

        /* Hero Section */
        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .hero h1 {
            font-family: Cinzel, serif;
            font-size: 4rem;
            color: #f8d66d;
            line-height: 1.2;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(248, 214, 109, 0.2);
        }
        .hero p {
            max-width: 700px;
            margin: 0 auto 30px auto;
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Interactive Micro-animations for Buttons */
        .btn {
            display: inline-block;
            background: #f8d66d;
            color: #08111f;
            padding: 14px 36px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(248, 214, 109, 0.35);
            background: #ffe394;
        }

        section {
            padding: 100px 8% 60px 8%;
        }

            font-family: Cinzel, serif;
            color: #f8d66d;
            text-align: center;
            margin-bottom: 45px;
            font-size: 2.3rem;
            letter-spacing: 1px;
        }
